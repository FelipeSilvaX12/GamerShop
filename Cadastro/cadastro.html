<!DOCTYPE html>
<html lang="pt-br">

<head>

    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="global.css">
</head>

<body>



    <nav>
        <a href="../Cadastro/cadastro.html">cadastro</a>
        <a href="../detalhes/detalhes.html">detalhes</a>

        <a href="../listagem/listagem.html">Listagem</a>
        <a href="../Login/login.html">Login</a>
        <a href="../resumo/resumo.html">Resumo</a>
    </nav>

    <div class="cadastro">

        <div class="img-cadastro">
            <img src="../imagens/undraw_annotations_2xx4.svg" alt="">

        </div>


        <main>

            <Header>
                <h1> Gamer shop</h1>
            </Header>


            <h2> Cadastro </h2>
            <form onsubmit="alert('cadastro eftetuado')">


                <h3>Coloque seus dados abaixo e finalize seu cadastro :</h3>

                <p>
                    <input required type="text" placeholder="Nome">
                </p>

                <p>

                    <input required type="email" placeholder="Email">

                </p>
                <p>

                    <input required type="password" placeholder="Senha">
                </p>

                <p>
                    <input required type="number" placeholder="CPF">
                </p>

                <p>
                    <input required type="text" placeholder="Endereço">
                </p>

                <p>
                    <input required type="number" placeholder="Numero de telefone">
                </p>



                <p>


                    <label class="opcao-genero">


                        <strong>Sexo :</strong> <br>

                        <input type="radio" name="genero" value="masculino">
                        <span class="botao-customizado"></span>
                        Masculino
                    </label>

                    <label class="opcao-genero">
                        <input type="radio" name="genero" value="feminino">
                        <span class="botao-customizado"></span>
                        Feminino
                    </label>

                    <label class="opcao-genero">
                        <input type="radio" name="genero" value="outro">
                        <span class="botao-customizado"></span>
                        Outro
                    </label>




                </p>



                <p>


                    <label class="metodo-pagamento">

                        <strong>metodo de pagamento :</strong> <br>

                        <input type="radio" name="pagamento" value="pix">
                        <span></span>
                        Pix
                    </label>

                    <label>
                        <input type="radio" name="pagamento" value="Débito">
                        <span></span>
                        Débito
                    </label>

                    <label>
                        <input type="radio" name="pagamento" value="Crédito">
                        <span></span>
                        Crédito
                    </label>




                </p>
                <div id="finalizar">

                    <button type="submit">

                        <a href="../Login/login.html">Finalizar</a>

                    </button>

                </div>
    </div>


    </main>


    </div>



</body>
